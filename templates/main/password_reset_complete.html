{% extends 'base.html' %}
{% load static %}

{% block title %}Пароль успішно змінено - FinSmart{% endblock %}

{% block content %}
<div class="auth-page" style="background-image: url('{% static 'img/blue.png' %}');">
    <div class="auth-card" style="text-align: center;">
        
        <div style="display: flex; justify-content: center; margin-bottom: 24px;">
            <div style="width: 72px; height: 72px; background: rgba(52, 211, 153, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(52, 211, 153, 0.3); box-shadow: 0 0 30px rgba(52, 211, 153, 0.2);">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>
        </div>

        <h2 class="auth-title" style="margin-bottom: 16px;">Пароль змінено!</h2>
        
        <p style="color: rgba(255,255,255,0.8); font-size: 16px; line-height: 1.6; margin-bottom: 32px;">
            Ваш пароль успішно змінено. Тепер ви можете увійти до свого облікового запису з новим паролем.
        </p>

        <a href="{% url 'login' %}" class="btn-auth" style="text-decoration: none; display: flex; align-items: center; justify-content: center; background: #10b981;">
            УВІЙТИ В АКАУНТ
        </a>
    </div>
</div>

<style>
    .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        padding: 40px 20px;
        margin-top: -80px;
        padding-top: 120px;
    }

    .auth-card {
        width: 100%;
        max-width: 460px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 20px;
        padding: 48px 40px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    [data-theme="dark"] .auth-card {
        background: rgba(15, 20, 30, 0.55);
        border-color: rgba(255, 255, 255, 0.1);
    }

    .auth-title {
        font-size: 28px;
        font-weight: 700;
        color: white;
        letter-spacing: -0.3px;
    }

    .btn-auth {
        width: 100%;
        padding: 14px;
        background: #4a8fd5;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
    }

    .btn-auth:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
        box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
    }

    @media (max-width: 520px) {
        .auth-card {
            padding: 36px 24px;
        }
    }
</style>
{% endblock %}
