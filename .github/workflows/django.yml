name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd volunteer
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-django

      - name: Run tests with coverage
        run: |
          cd volunteer
          pytest --cov=. --cov-report=html --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: volunteer/htmlcov
          retention-days: 7

  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install quality tools
        run: pip install flake8 black isort bandit

      - name: Flake8 — PEP8 стиль і синтаксис
        continue-on-error: true
        run: cd volunteer && flake8 .

      - name: Black — перевірка форматування
        run: cd volunteer && black --check .

      - name: isort — порядок імпортів
        run: cd volunteer && isort --check-only .

      - name: Bandit — security scan
        continue-on-error: true
        run: cd volunteer && bandit -r . -x .venv,migrations -ll
